<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.min.css" rel="stylesheet" />
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.umd.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/leosc91/Componente-Menu@main/css/componente.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <div id="menu-usuario" class="menu-flotante"></div>

    <div class="contenedor">
        <div class="formularioAlumnos">
        <h1>Datos Escolares</h1>
        <form id="formDatos">
            <div class="campo">
                <label for="nombre">Número de control:</label>
                <input type="text" id="nc" maxlength="6" placeholder="221614" required>
            </div>
            <p class="error" id="errorNumeroControl"></p>

            <div class="campo">
                <label for="semestre">Último semestre cursado:</label>
                <input type="number" min="1" id="semestre" placeholder="Ej: 1" required>
            </div>
            <p class="error" id="errorSemestre"></p>

            <div class="campo">
                <label for="fechaNacimiento">Fecha de nacimiento:</label>
                <input type="date" id="fechaNacimiento" required>
            </div>
            <p class="error" id="errorFecha"></p>

            <button type="button" onclick="guardarDatos()">Guardar</button>
        </form>
    </div>

    <div id="modal" class="modal oculto">
        <div class="modalGuardados">
            <h2>Datos guardados</h2>
            <p id="nc-guardado"></p>
            <p id="semestre-guardado"></p>
            <p id="edad-calculada"></p>
            <p id="edad-validacion"></p>
            <button type="button" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    </div>

    <script src="https://cdn.jsdelivr.net/gh/leosc91/Componente-Menu@main/js/componente.js"></script>

    <button id="boton-sidebar" class="boton-hamburguesa">
        <i class="fas fa-bars"></i>
    </button>

    <div id="sidebar" class="sidebar">
        <h3>Menú Usuarios</h3>
        <h4>Captura</h4>
        
        <form id="formulario-captura">
            <label for="nombre">Nombre de usuario:</label>
            <input type="text" id="nombre" required>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" required>

            <button type="submit" class="boton-validar">Validar Datos</button>
        </form>
        
        <p id="mensaje-validacion"></p>
    </div>
    <script src="js/index.js"></script>
</body>
</html>
