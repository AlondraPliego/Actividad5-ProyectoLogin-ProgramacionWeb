<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.min.css" rel="stylesheet" />
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.umd.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/leosc91/Componente-Menu@main/css/componente.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <div id="menu-usuario" class="menu-flotante"></div>

    <div class="contenedor">
        <h2>Espacio reservado</h2>
        <p>Aquí puedes agregar las dos funcionalidades que faltan (modal y el otro).</p>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/leosc91/Componente-Menu@main/js/componente.js"></script>

    <button id="boton-sidebar" class="boton-hamburguesa">
        <i class="fas fa-bars"></i>
    </button>

    <div id="sidebar" class="sidebar">
        <h3>Menú Usuarios</h3>
        <h4>Captura</h4>
        
        <form id="formulario-captura">
            <label for="nombre">Nombre de usuario:</label>
            <input type="text" id="nombre" required>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" required>

            <button type="submit" class="boton-validar">Validar Datos</button>
        </form>
        
        <p id="mensaje-validacion"></p>
    </div>
    <script src="js/index.js"></script>
</body>
</html>
