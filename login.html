<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.min.css" rel="stylesheet" />

<body>
    <section class="h-100 gradient-form" style="background-color: #000000;">

                    <div class="text-center">

                    </div>

                    <form>

                        <input type="email" id="form2Example11" class="form-control"
                        placeholder="Correo electronico" />

                    </div>

                    <div data-mdb-input-init class="form-outline mb-4">
                        <input type="password" id="form2Example22" class="form-control" />

                    </div>

                    <div class="text-center pt-1 mb-5 pb-1">
                        <button data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-block fa-lg gradient-custom-2 mb-3" type="button">
                            Login</button>
                    </div>

                    </form>

                </div>
                </div>
                    <div class="col-lg-6 d-flex align-items-center gradientI-custom-2 py-5">

                    </div>
                </div>
                    </div>
                </div>
                </div>
            </div>
            </div>

        </div>
    </div>
